<!DOCTYPE html>
<html>

<head>
    <title>Random Master Position</title>

    <!-- Chessboard CSS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css" />

    <!-- Chess.js for FEN calculation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

    <!-- Chessboard.js for board display -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 40px;
            text-align: center;
        }

        #board {
            width: 400px;
            margin: 20px auto;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        pre {
            font-size: 16px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <h2>Random Position From Master Games</h2>
    <button onclick="generate()">New Random Position</button>

    <div id="board"></div>

    <h3>Next 6 half moves</h3>
    <pre id="moves"></pre>

    <script>
        // Sample master games moves (simplified)
        const games = [
            ["e4", "e5", "Nf3", "Nc6", "Bb5", "a6", "Ba4", "Nf6", "O-O", "Be7", "Re1", "b5", "Bb3", "d6", "c3", "O-O", "h3"],
            ["d4", "Nf6", "c4", "e6", "Nc3", "Bb4", "e3", "O-O", "Bd3", "d5", "Nf3", "c5", "O-O", "Nc6"],
            ["e4", "c5", "Nf3", "d6", "d4", "cxd4", "Nxd4", "Nf6", "Nc3", "a6", "Be3", "e5", "Nb3"],
            ["c4", "e5", "Nc3", "Nf6", "g3", "d5", "cxd5", "Nxd5", "Bg2", "Nb6", "Nf3", "Nc6", "O-O", "Be7"]
        ];

        let board; // chessboard.js instance

        function generate() {
            // pick a random game
            const game = games[Math.floor(Math.random() * games.length)];

            // pick a random starting position that leaves room for 6 moves
            const index = Math.floor(Math.random() * (game.length - 6));

            // initialize chess.js board and play moves up to index
            const chess = new Chess();
            for (let i = 0; i < index; i++) {
                chess.move(game[i]);
            }

            // render the board
            if (board) {
                board.position(chess.fen());
            } else {
                board = Chessboard('board', {
                    position: chess.fen(),
                    draggable: false
                });
            }

            // next 6 half moves
            const nextMoves = game.slice(index, index + 6);
            document.getElementById("moves").textContent = nextMoves.join(" ");
        }

        // generate one position when page loads
        generate();
    </script>

</body>
</html>
