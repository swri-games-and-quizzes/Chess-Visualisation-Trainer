<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Random Master Position</title>

<!-- Chessground CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chessground@8.1.0/dist/chessground.min.css">

<!-- Local chess.js -->
<script src="chess.min.js"></script>

<!-- Chessground JS -->
<script src="https://cdn.jsdelivr.net/npm/chessground@8.1.0/dist/chessground.min.js"></script>

<style>
  body { font-family: Arial; text-align: center; padding: 40px; }
  #board { width: 400px; height: 400px; margin: 20px auto; }
  button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
  pre { font-size: 16px; white-space: pre-wrap; word-wrap: break-word; }
</style>
</head>
<body>

<h2>Random Position From Your PGNs</h2>
<button id="genBtn">New Random Position</button>

<div id="board"></div>

<h3>Next 6 Half Moves</h3>
<pre id="moves"></pre>

<script>
let cg;

// --- Your 2 PGNs ---
const pgns = [
`1. e4 g6 2. d4 Bg7 3. Nc3 e6 4. f4 Ne7 5. Nf3 d5 6. Bd3 O-O 7. O-O b6 8. Be3 a5 9. Qe1 Ba6 10. Bxa6 Nxa6 11. Rd1 Nb4 12. Qf2 dxe4 13. Nxe4 Nxa2 14. c3 a4 15. Ra1 Qd5 16. Ned2 b5`,
`1. d4 d5 2. Bf4 c5 3. e3 cxd4 4. exd4 Nc6 5. c3 Bf5 6. Qb3 Qd7 7. Nf3 f6 8. Nbd2 g5 9. Bg3 h5 10. h3 Bg6 11. Be2 Nh6 12. O-O-O Nf5 13. Bh2 a6 14. Nf1 b5 15. Bd3 Rc8 16. Kb1 e6 17. Ne3 b4 18. Nxf5 Bxf5`
];

// Parse PGNs into arrays of moves
const games = pgns.map(pgn => {
    const chess = new Chess();
    chess.load_pgn(pgn);
    return chess.history();
});

function generate() {
    const gameIndex = Math.floor(Math.random() * games.length);
    const moves = games[gameIndex];

    if (moves.length < 6) {
        alert("Game too short!");
        return;
    }

    const startIndex = Math.floor(Math.random() * (moves.length - 6));
    const chess = new Chess();

    for (let i = 0; i < startIndex; i++) {
        chess.move(moves[i]);
    }

    // Initialize or update the Chessground board
    if (!cg) {
        cg = Chessground(document.getElementById('board'), {
            orientation: 'white',
            draggable: false,
            viewOnly: true,
            fen: chess.fen()
        });
    } else {
        cg.set({ fen: chess.fen() });
    }

    // Display next 6 half-moves
    const next6 = moves.slice(startIndex, startIndex + 6);
    document.getElementById("moves").textContent = next6.join(" ");
}

window.onload = function() {
    document.getElementById("genBtn").onclick = generate;
    generate();
};
</script>

</body>
</html>
