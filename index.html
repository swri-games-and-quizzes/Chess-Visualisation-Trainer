<!DOCTYPE html>
<html>

<head>

<title>Random Master Position</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

<style>

body{
font-family:Arial;
padding:40px;
}

#board{
width:400px;
margin-top:20px;
}

button{
padding:10px;
font-size:16px;
}

</style>

</head>

<body>

<h2>Random Position From Master Games</h2>

<button onclick="generate()">New Random Position</button>

<div id="board"></div>

<h3>Next 6 half moves</h3>
<pre id="moves"></pre>

<script>

let board

let games = [

["e4","e5","Nf3","Nc6","Bb5","a6","Ba4","Nf6","O-O","Be7","Re1","b5","Bb3"],
["d4","Nf6","c4","e6","Nc3","Bb4","e3","O-O","Bd3","d5","Nf3","c5"],
["e4","c5","Nf3","d6","d4","cxd4","Nxd4","Nf6","Nc3","a6","Be3","e5","Nb3"],
["c4","e5","Nc3","Nf6","g3","d5","cxd5","Nxd5","Bg2","Nb6","Nf3","Nc6"]

]

function generate(){

let game = games[Math.floor(Math.random()*games.length)]

let index = Math.floor(Math.random()*(game.length-6))

let chess = new Chess()

for(let i=0;i<index;i++){
chess.move(game[i])
}

let fen = chess.fen()

board = Chessboard('board',{
position:fen,
draggable:false
})

let nextMoves = game.slice(index,index+6)

document.getElementById("moves").textContent =
nextMoves.join(" ")

}

</script>

</body>

</html>
