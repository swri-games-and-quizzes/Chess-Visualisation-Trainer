<!DOCTYPE html>
<html>
<head>
<title>Random Master Position from PGNs</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<style>
body {
  font-family: Arial;
  padding: 40px;
  text-align: center;
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 40px);
  grid-template-rows: repeat(8, 40px);
  width: 320px;
  margin: 20px auto;
  border: 2px solid black;
}

.square {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.square.light { background: #f0d9b5; }
.square.dark { background: #b58863; }

button {
  padding: 10px 20px;
  font-size: 16px;
  margin-bottom: 20px;
  cursor: pointer;
}

pre {
  font-size: 16px;
  white-space: pre-wrap;
  text-align: left;
  display: inline-block;
}
</style>
</head>
<body>

<h2>Random Position From Your PGNs</h2>
<button onclick="generate()">New Random Position</button>

<div id="board"></div>

<h3>Next 6 Half Moves</h3>
<pre id="moves"></pre>

<script>
// Unicode symbols for pieces
const pieces = {
  'P':'♙','N':'♘','B':'♗','R':'♖','Q':'♕','K':'♔',
  'p':'♟','n':'♞','b':'♝','r':'♜','q':'♛','k':'♚'
};

// Board drawing
function drawBoard(fen) {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";
  const chess = new Chess(fen);
  const boardObj = chess.board();
  for(let rank=0; rank<8; rank++){
    for(let file=0; file<8; file++){
      const squareDiv = document.createElement("div");
      const isLight = (rank+file)%2===0;
      squareDiv.className = "square "+(isLight?"light":"dark");
      const piece = boardObj[rank][file];
      if(piece) squareDiv.textContent = pieces[piece.color=== 'w'?piece.type.toUpperCase():piece.type];
      boardDiv.appendChild(squareDiv);
    }
  }
}

// ------------------------------
// PASTE YOUR 2 PGNs HERE
// ------------------------------
const pgns = [
`1. e4 g6 2. d4 Bg7 3. Nc3 e6 4. f4 Ne7 5. Nf3 d5 6. Bd3 O-O 7. O-O b6 8. Be3 a5 9. Qe1 Ba6 10. Bxa6 Nxa6 11. Rd1 Nb4 12. Qf2 dxe4 13. Nxe4 Nxa2 14. c3 a4 15. Ra1 Qd5 16. Ned2 b5`
,
`1. d4 d5 2. Bf4 c5 3. e3 cxd4 4. exd4 Nc6 5. c3 Bf5 6. Qb3 Qd7 7. Nf3 f6 8. Nbd2 g5 9. Bg3 h5 10. h3 Bg6 11. Be2 Nh6 12. O-O-O Nf5 13. Bh2 a6 14. Nf1 b5 15. Bd3 Rc8 16. Kb1 e6 17. Ne3 b4 18. Nxf5 Bxf5`
];

// Parse PGNs into Chess.js games
const games = pgns.map(pgnText=>{
  const chess = new Chess();
  chess.load_pgn(pgnText);
  const moves = chess.history(); // full list of moves
  return moves;
});

let boardFEN = null;

function generate(){
  // pick a random game
  const gameIndex = Math.floor(Math.random()*games.length);
  const moves = games[gameIndex];

  if(moves.length < 6){
    alert("Game too short for 6 half moves.");
    return;
  }

  // pick a random starting move index leaving room for 6 half moves
  const startIndex = Math.floor(Math.random()*(moves.length - 6));

  // play moves up to startIndex
  const chess = new Chess();
  for(let i=0;i<startIndex;i++){
    chess.move(moves[i]);
  }

  // save FEN
  boardFEN = chess.fen();
  drawBoard(boardFEN);

  // next 6 half moves
  const next6 = moves.slice(startIndex, startIndex+6);
  document.getElementById("moves").textContent = next6.join(" ");
}

// generate first position on load
generate();

</script>

</body>
</html>
