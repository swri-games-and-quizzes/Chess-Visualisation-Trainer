<!DOCTYPE html>
<html>
<head>
<title>Random Master Position</title>
<style>
body {
  font-family: Arial;
  padding: 40px;
  text-align: center;
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 40px);
  grid-template-rows: repeat(8, 40px);
  width: 320px;
  margin: 20px auto;
  border: 2px solid black;
}

.square {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.square.light { background: #f0d9b5; }
.square.dark { background: #b58863; }

button {
  padding: 10px 20px;
  font-size: 16px;
}

pre {
  font-size: 16px;
  white-space: pre-wrap;
  text-align: left;
  display: inline-block;
}
</style>
</head>
<body>

<h2>Random Position From Master Games</h2>
<button onclick="generate()">New Random Position</button>

<div id="board"></div>

<h3>Next 6 Half Moves</h3>
<pre id="moves"></pre>

<script>
// Sample master games (list of moves in algebraic notation)
const games = [
["e4","e5","Nf3","Nc6","Bb5","a6","Ba4","Nf6","O-O","Be7","Re1","b5","Bb3"],
["d4","Nf6","c4","e6","Nc3","Bb4","e3","O-O","Bd3","d5","Nf3","c5"],
["e4","c5","Nf3","d6","d4","cxd4","Nxd4","Nf6","Nc3","a6","Be3","e5","Nb3"],
["c4","e5","Nc3","Nf6","g3","d5","cxd5","Nxd5","Bg2","Nb6","Nf3","Nc6"]
];

// Unicode symbols for pieces
const pieces = {
  'P':'♙','N':'♘','B':'♗','R':'♖','Q':'♕','K':'♔',
  'p':'♟','n':'♞','b':'♝','r':'♜','q':'♛','k':'♚'
};

// Simple chessboard representation
function drawBoard(position) {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";
  const files = ['a','b','c','d','e','f','g','h'];
  for (let rank=8; rank>=1; rank--) {
    for (let file=0; file<8; file++) {
      const square = document.createElement("div");
      const isLight = (rank+file)%2===0;
      square.className = "square "+(isLight?"light":"dark");
      const key = files[file]+rank;
      if(position[key]) square.textContent = pieces[position[key]];
      boardDiv.appendChild(square);
    }
  }
}

// Very basic chess engine to keep track of positions
class SimpleChess {
  constructor() { this.reset(); }
  reset() { 
    // initial board mapping: piece at square
    this.board = {
      a1:'R',b1:'N',c1:'B',d1:'Q',e1:'K',f1:'B',g1:'N',h1:'R',
      a2:'P',b2:'P',c2:'P',d2:'P',e2:'P',f2:'P',g2:'P',h2:'P',
      a7:'p',b7:'p',c7:'p',d7:'p',e7:'p',f7:'p',g7:'p',h7:'p',
      a8:'r',b8:'n',c8:'b',d8:'q',e8:'k',f8:'b',g8:'n',h8:'r'
    };
  }
  move(move) {
    // very simplified: only moves pawns/knights/bishops/rooks/queens/kings by basic algebraic, no castling
    // expects moves like "e4", "Nf3"
    if(move.length<2) return;
    const files = ['a','b','c','d','e','f','g','h'];
    const ranks = ['1','2','3','4','5','6','7','8'];
    let from="",to="";
    if(move.length===2){ // pawn move
      const file=move[0]; const rank=move[1];
      for(const sq in this.board){
        if(this.board[sq]==='P' && sq[0]===file) {from=sq; break;}
      }
      to = move;
    } else {
      // e.g., Nf3
      to = move.slice(-2);
      const pieceChar = move[0];
      for(const sq in this.board){
        if(this.board[sq]===pieceChar) {from=sq; break;}
      }
    }
    if(from && to) {
      this.board[to]=this.board[from];
      delete this.board[from];
    }
  }
  getPosition() { return this.board; }
}

function generate() {
  const game = games[Math.floor(Math.random()*games.length)];
  const index = Math.floor(Math.random()*(game.length-6));
  const next6 = game.slice(index,index+6);
  const chess = new SimpleChess();
  for(let i=0;i<index;i++) chess.move(game[i]);
  drawBoard(chess.getPosition());
  document.getElementById("moves").textContent = next6.join(" ");
}

// generate first position
generate();
</script>

</body>
</html>
